# .github/workflows/iso-build.yml

name: Build open.Yellow.os ISO (ja / en)
####################################################################
# 発火条件
####################################################################
on:
  push:
    branches: [ main ]          # main への push
    tags:     [ 'v*' ]          # 例: v1.0.0 などバージョンタグ
  workflow_dispatch:            # 手動実行も可

####################################################################
# 同一ブランチでの多重実行を防止
####################################################################
concurrency:
  group: iso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

####################################################################
# ジョブ定義
####################################################################
    strategy:
      matrix:
        lang: [ ja, en ]           # ← 必要なら “de” など追加も可
      fail-fast: false             # 片方失敗してももう片方は続行

    steps:
      ##################################################################
      # 1. チェックアウト
      ##################################################################
      - uses: actions/checkout@v4

      ##################################################################
      # 2. 依存キャッシュ（APT）
      ##################################################################
      - uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/iso-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      ##################################################################
      # 3. 依存インストール
      ##################################################################
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              mmdebstrap \
              rsync \
              squashfs-tools \
              xorriso \
              dosfstools \
              mtools \
              xz-utils \
              grub-common \
              grub-pc-bin \
              grub-efi-amd64-bin \
              shim-signed \
              debian-archive-keyring \
              git

      ##################################################################
      # 3-1. デバッグコード
      ##################################################################
              
      - name: Debug grub toolchain
        run: |
          echo "=== Basic tool paths ==="
          command -v grub-mkrescue || true
          command -v xorriso || true
          command -v mformat || true
          command -v mmdebstrap || true

          echo ""
          echo "=== Versions ==="
          grub-mkrescue --version || true
          xorriso --version || true
          mmdebstrap --version || true

          echo ""
          echo "=== Installed grub packages ==="
          dpkg -l | egrep 'grub-(common|pc-bin|efi-amd64-bin|efi-amd64-signed)' || true

          echo ""
          echo "=== Check i386-pc modules (BIOS support) ==="
          ls -l /usr/lib/grub/i386-pc 2>/dev/null || echo "i386-pc modules NOT found"

          echo ""
          echo "=== Check x86_64-efi modules (UEFI support) ==="
          ls -l /usr/lib/grub/x86_64-efi 2>/dev/null || echo "x86_64-efi modules NOT found"
          
      ##################################################################
      # 4. Python 仮想環境と Python 依存
      ##################################################################
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      ##################################################################
      # 5. ISO ビルド
      ##################################################################
      - name: Build ISO (${{ matrix.lang }})
        run: |
          . .venv/bin/activate
          sudo -E .venv/bin/python ./bin/oyo_builder.py \
            --flavor gnome \
            --lang ${{ matrix.lang }} \
            --brand oYo \
            build

      ##################################################################
      # 6. 成果物アップロード
      ##################################################################
      - name: Upload ISO artifact (${{ matrix.lang }})
        uses: actions/upload-artifact@v4
        with:
          name: openYellowOS-ISO-${{ matrix.lang }}
          path: "*.iso"    # builder.py が出力する ISO 置き場
          if-no-files-found: error
